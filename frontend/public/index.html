            function removeBranding() {
                document.querySelectorAll('body > iframe, body > div:not(#root):not(#bintronix-badge)').forEach(function(el) {

            document.addEventListener('DOMContentLoaded', removeBranding);
            setInterval(removeBranding, 500);
            var obs = new MutationObserver(removeBranding);
            document.addEventListener('DOMContentLoaded', function() {
                obs.observe(document.body, { childList: true, subtree: true });
            });
